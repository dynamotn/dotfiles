title: Secrets SSL
description: Custom certificates for SSL/TLS connections
type: object
required: [certs]
additionalProperties: false
properties:
  certs:
    type: array
    items:
      type: object
      required: [file, desc]
      additionalProperties: false
      properties:
        desc:
          type: string
          description: Certificate description
        file:
          type: string
          description: Content of the certificate file
