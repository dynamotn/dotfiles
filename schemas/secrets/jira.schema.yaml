title: Secrets Jira
description: Jira server connection and project configuration
type: object
required: [servers]
additionalProperties: false
properties:
  servers:
    type: array
    items:
      type: object
      required: [scope, token, config]
      additionalProperties: false
      properties:
        scope:
          type: string
          description: Logical scope label linking to k8s/docker scopes
        token:
          type: string
          description: Jira API token (Base64-encoded)
        config:
          type: object
          required: [board, project]
          additionalProperties:
            type: object
            properties:
              <<:
                type: string
                description: Merge key anchor
          properties:
            auth_type:
              type: string
              enum: [bearer, basic]
            board:
              type: object
              required: [id, name, type]
              additionalProperties: false
              properties:
                id:
                  type: integer
                name:
                  type: string
                type:
                  type: string
                  enum: [kanban, scrum, simple]
            epic:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  description: Custom field key for epic name
                link:
                  type: string
                  description: Custom field key for epic link
            installation:
              type: string
              enum: [Local, Cloud]
            issue:
              type: object
              additionalProperties: false
              properties:
                fields:
                  type: object
                  additionalProperties: false
                  properties:
                    custom:
                      type: array
                      items:
                        $ref: "#/$defs/jira_custom_field"
                types:
                  type: array
                  items:
                    $ref: "#/$defs/jira_issue_type"
            login:
              type: string
              description: Username or email used to authenticate
            project:
              type: object
              required: [key]
              additionalProperties: false
              properties:
                key:
                  type: string
                type:
                  type: string
            server:
              type: string
              description: Base URL of the Jira server
            timezone:
              type: string
            version:
              type: object
              required: [major, minor, patch]
              additionalProperties: false
              properties:
                major:
                  type: integer
                minor:
                  type: integer
                patch:
                  type: integer

$defs:
  jira_custom_field:
    type: object
    required: [name, key, schema]
    additionalProperties: false
    properties:
      name:
        type: string
      key:
        type: string
        description: Jira custom field key (e.g. customfield_10102)
      schema:
        type: object
        required: [datatype]
        additionalProperties: false
        properties:
          datatype:
            type: string
          items:
            type: string
            description: Element type when datatype is 'array'

  jira_issue_type:
    type: object
    required: [id, name, handle, subtask]
    additionalProperties: false
    properties:
      id:
        type: string
      name:
        type: string
      handle:
        type: string
        description: Short identifier used in CLI/config
      subtask:
        type: boolean
