title: Secrets SSH
description: SSH client host alias definitions
type: object
required: [hosts]
additionalProperties: false
properties:
  hosts:
    type: array
    items:
      type: object
      required: [host, hostname, user, identities]
      additionalProperties: false
      properties:
        host:
          type: string
          description: SSH Host alias (used in ~/.ssh/config)
        hostname:
          type: string
          description: Real hostname or IP address to connect to
        port:
          type: integer
          description: SSH port (defaults to 22 when omitted)
        user:
          type: string
          description: Remote login username
        identities:
          type: array
          description: Identity key names to try in order
          items:
            type: string
          minItems: 1
        jump:
          description: Optional jump host alias
          oneOf:
            - type: string
            - type: null
