title: Secrets RBW
description: rbw (Bitwarden CLI) server and session configuration
type: object
required: [email, base_url, lock_timeout, pinentry]
additionalProperties: false
properties:
  email:
    type: string
    description: Bitwarden account email address
  base_url:
    type: string
    description: Self-hosted Vaultwarden/Bitwarden server URL
  identity_url:
    oneOf:
      - type: "null"
      - type: string
        description: Override identity server URL (leave null to derive from base_url)
  lock_timeout:
    type: integer
    description: Idle timeout in seconds before the vault auto-locks
  pinentry:
    type: string
    description: pinentry program name (e.g. 'pinentry', 'pinentry-mac')
