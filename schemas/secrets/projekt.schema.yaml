title: Secrets Projekt
description: Git project workspace folder definitions for the projekt tool
type: object
required: [folders]
additionalProperties: false
properties:
  folders:
    type: array
    items:
      type: object
      required: [path, prefix, is_workspace, regex, priority]
      additionalProperties: false
      properties:
        path:
          type: string
          description: Absolute filesystem path (may contain $HOME)
        prefix:
          type: string
          description: Short label prefix used in switcher
        is_workspace:
          type: boolean
        regex:
          type: string
          description: Optional filter regex applied to repository names
        priority:
          type: integer
          description: Sort priority; lower value = higher priority
        git:
          type: object
          required: [host, group, repos]
          additionalProperties: false
          properties:
            host:
              type: string
              description: SSH/HTTPS host alias (matches ssh_config Host entry)
            group:
              type: string
              description: GitLab/GitHub group or organisation path
            repos:
              type: array
              items:
                type: object
                required: [name, path]
                additionalProperties: false
                properties:
                  name:
                    type: string
                    description: Human-readable repository label
                  path:
                    type: string
                    description: Repository path relative to the group
  regex:
    type: object
    description: Named regex patterns used as substitution variables in paths
    additionalProperties:
      type: integer
