title: Secrets Docker
description: Docker/OCI registry authentication credentials
type: object
required: [auths]
additionalProperties: false
properties:
  auths:
    type: array
    items:
      type: object
      required: [repo, username, password]
      additionalProperties: false
      properties:
        repo:
          type: string
          description: Registry hostname or URL
        username:
          type: string
        password:
          type: string
        scope:
          type: string
          description: Logical scope label (e.g. 'global', 'OP')
