title: Secrets Common
description: Common account credentials and cloud storage configuration
type: object
additionalProperties: false
properties:
  hosts:
    type: string
    description: Comma-separated list of hostnames this account is associated with
  account:
    type: object
    description: Primary account credentials
    required: [username, password]
    additionalProperties: false
    properties:
      username:
        type: string
      password:
        oneOf:
          - type: string
          - type: integer
        description: Account password (stored as string or bare number)
      domain:
        type: string
        description: Windows/corporate domain name
  rclone:
    type: array
    description: rclone remote configuration blocks
    items:
      type: object
      required: [content]
      additionalProperties: false
      properties:
        content:
          type: string
          description: Raw rclone config block text
