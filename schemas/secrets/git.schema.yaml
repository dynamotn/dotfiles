title: Secrets Git
description: Git server credentials and configuration
type: object
required: [servers, configs]
additionalProperties: false
properties:
  servers:
    type: array
    description: List of Git servers and credentials
    items:
      type: object
      required: [name, type, https, ssh, token, preferGitSSH, regexDevices, negativeRegexDevices, prefix]
      additionalProperties: false
      properties:
        name:
          type: string
          description: Human-readable server name
        type:
          type: string
          enum: [gitlab, github]
          description: Type of git server
        https:
          type: string
          description: HTTPS URL of the server
        ssh:
          type: string
          description: SSH URL of the server
        username:
          type: string
          description: Username for authentication (optional, for github)
        token:
          type: string
          description: Personal access token or OAuth token
        preferGitSSH:
          type: boolean
          description: Prefer SSH over HTTPS for git operations
        regexDevices:
          type: string
          description: Regex to match allowed devices
        negativeRegexDevices:
          type: string
          description: Regex to exclude devices
        prefix:
          type: string
          description: Prefix for environment variables related to this server (e.g., "F1_" to generate "F1_GITHUB")
  configs:
    type: array
    description: Extra git configuration blocks
    items:
      type: object
      required: [regexDevices, negativeRegexDevices, config]
      additionalProperties: false
      properties:
        regexDevices:
          type: string
          description: Regex to match allowed devices
        negativeRegexDevices:
          type: string
          description: Regex to exclude devices
        config:
          type: string
          description: Raw git config block
  copilot:
    type: string
    description: JSON string for GitHub Copilot authentication/configuration
