title: Secrets K8s
description: Kubernetes cluster, context and user credential definitions
type: object
required: [clusters, contexts, users]
additionalProperties: false
properties:
  current-context:
    type: string
    description: Name of the active context
  clusters:
    type: array
    items:
      type: object
      required: [cluster, name]
      additionalProperties: false
      properties:
        name:
          type: string
        scope:
          type: string
          description: Logical scope label
        cluster:
          type: object
          required: [server]
          additionalProperties: false
          properties:
            server:
              type: string
              description: API server URL
            certificate-authority-data:
              type: string
              description: Base64-encoded CA certificate
  contexts:
    type: array
    items:
      type: object
      required: [context, name]
      additionalProperties: false
      properties:
        name:
          type: string
        scope:
          type: string
        context:
          type: object
          required: [cluster, user]
          additionalProperties: false
          properties:
            cluster:
              type: string
            user:
              type: string
  users:
    type: array
    items:
      type: object
      required: [name, user]
      additionalProperties: false
      properties:
        name:
          type: string
        scope:
          type: string
        user:
          oneOf:
            - description: Token-based authentication
              type: object
              required: [token]
              additionalProperties: false
              properties:
                token:
                  type: string
            - description: Certificate-based authentication
              type: object
              required: [client-certificate-data, client-key-data]
              additionalProperties: false
              properties:
                client-certificate-data:
                  type: string
                  description: Base64-encoded client certificate
                client-key-data:
                  type: string
                  description: Base64-encoded client private key
