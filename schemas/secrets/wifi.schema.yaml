title: Secrets Wifi
description: Wi-Fi network profile definitions
type: array
items:
  type: object
  required: [name, ssid, type, password]
  additionalProperties: false
  properties:
    name:
      type: string
      description: Human-readable network label
    ssid:
      type: string
      description: Wi-Fi SSID
    type:
      type: string
      enum: [wpa-psk, wpa-eap]
      description: Authentication method
    identity:
      type: string
      description: EAP identity / username (required for wpa-eap)
    password:
      type: string
      description: Pre-shared key or EAP password (may reference $ACCOUNT_PASSWORD)
    params:
      type: string
      description: Extra nmcli connection parameters as a shell-formatted string
