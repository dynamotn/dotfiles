title: Secrets WoL
description: Wake-on-LAN device definitions
type: array
items:
  type: object
  required: [name, address, broadcast]
  additionalProperties: false
  properties:
    name:
      type: string
      description: Human-readable device label
    address:
      type: string
      description: Target MAC address (colon-separated hex)
      pattern: "^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$"
    broadcast:
      type: string
      description: Subnet broadcast IP address
