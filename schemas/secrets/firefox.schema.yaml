title: Secrets Firefox
description: Firefox startpage bookmarks and tridactyl browser configuration
type: object
additionalProperties: false
properties:
  startpage:
    type: object
    required: [wallpaper, config]
    additionalProperties: false
    properties:
      wallpaper:
        type: string
        description: Relative path to the wallpaper image
      config:
        type: object
        description: >
          Category map of bookmark groups. Each key is a free-form
          category name; the value is a list of bookmark entries.
        additionalProperties:
          type: array
          items:
            $ref: "#/$defs/bookmark"
  tridactyl:
    type: object
    additionalProperties: false
    properties:
      blacklist:
        type: array
        description: Domains where tridactyl keybindings are disabled
        items:
          type: string

$defs:
  bookmark:
    type: object
    required: [name, url]
    additionalProperties: false
    properties:
      name:
        type: string
      url:
        type: string
      icon:
        type: string
        description: Nerd Font icon character or empty string
      icon_color:
        type: string
        description: Catppuccin colour name for the icon
